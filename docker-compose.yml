version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: whatsapp_clone_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: whatsapp_clone
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp_network

  # Backend Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsapp_clone_backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/whatsapp_clone?authSource=admin
      PORT: 5000
      CLIENT_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - whatsapp_network
    command: npm run dev

  # Frontend Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatsapp_clone_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - whatsapp_network
    command: npm start

volumes:
  mongodb_data:
    driver: local

networks:
  whatsapp_network:
    driver: bridge
